<div class="form-container">
  <form id="AccidentForm">
    
    <div class="grid-2">

<label>ID / Folio (Dictamen No)</label>
<input type="text" id="dictamen_no" placeholder="Ej. CAPUFE-2026-001" required>

<label>Carretera</label>

    <div class="sub-seccion">
        <h4>Clasificación del Hecho de Tránsito</h4>

            <div>
                <label>Tipo de Siniestro</label>
                <select id="clasificacion_hecho">
                    <option value="Salida del camino">Salida del camino</option>

                    <option value="Choque lateral">Choque lateral</option>
                    <option value="Choque por alcance">Choque por alcance</option>
                    <option value="Atropellamiento">Atropellamiento</option>
                    <option value="Incendio">Incendio</option>

            </div>
            <div>

                    <option value="Terraceria">Terracería</option>
                </select>
            </div>
        </div>

    <div class="sub-seccion">

        <div class="grid-3">

                    <option value="Imprudencia">Imprudencia</option>

                <label>Factor Camino</label>

                    <option value="Mojado">Mojado</option>
                    <option value="Falta de señales">Falta de señales</option>

                </select>

</div>

    </div>

    <button type="submit" id="btnPrincipal" class="btn-submit">GENERAR DOCUMENTO</button>
  </form>

<script>

    const SUPABASE_URL = "https://jjuqauxmkwqggvkayzxr.supabase.co";
const SUPABASE_KEY = "sb_publishable_4EZ3TWp81gUYerPR9aNgJg_we2oIqAc";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
// --- LÓGICA DE INTERFAZ DINÁMICA ---
function actualizarHechos() {
    const t = document.getElementById('tipohecho').value;
    document.getElementById('contenedor-filtros').classList.toggle('hidden', !t);
    document.getElementById('f-atrop').classList.toggle('hidden', t !== 'atropellamiento');
    document.getElementById('f-choque').classList.toggle('hidden', t !== 'choque');
    if(['volcadura','derrape','caidaPasajero'].includes(t)) checkPersona('persona');
}

function checkPersona(v) {
    document.getElementById('seccion-heridos').classList.toggle('hidden', v !== 'persona');
}

function dibujarHeridos() {
    const n = document.getElementById('num_heridos').value;
    const cont = document.getElementById('lista-heridos');
    cont.innerHTML = '';
    for(let i=1; i<=n; i++) {
        cont.innerHTML += `<div class="sub-seccion"><label>Herido ${i}: Tipo de lesión</label>
            <select name="lesion_${i}"><option value="leve">Leve</option><option value="grave">Grave</option><option value="fallecido">Fallecido</option></select></div>`;
    }
}

function toggleCausaOtro(sel) { document.getElementById('otro-causa').classList.toggle('hidden', sel.value !== 'otros'); }
function toggleCircOtro(sel) { document.getElementById('otro-circ').classList.toggle('hidden', sel.value !== 'Otra'); }

function renderVehiculos() {
    const n = document.getElementById('num_veh').value;
    const cont = document.getElementById('cont-vehiculos');
    cont.innerHTML = '';
    for(let i=1; i<=n; i++) {
        cont.innerHTML += `
            <div class="sub-seccion">
                <h4>UNIDAD ${i}</h4>
                <div class="grid-3">
                    <input placeholder="Marca / Modelo"><input placeholder="Placas"><input placeholder="Procedencia">
                </div>
                <div class="grid-2">
                    <div>
                        <label>Categoría Licencia</label>
                        <select id="cat_${i}" onchange="updateLic(${i})">
                            <option value="">Seleccione...</option>
                            <option value="p">Particular</option><option value="f">Federal</option>
                        </select>
                    </div>
                    <div id="div_sel_${i}" class="hidden">
                        <label>Tipo Licencia</label><select id="sel_${i}"></select>
                    </div>
                </div>
            </div>`;
    }
}

function updateLic(idx) {
    const cat = document.getElementById(`cat_${idx}`).value;
    const div = document.getElementById(`div_sel_${idx}`);
    const sel = document.getElementById(`sel_${idx}`);
    sel.innerHTML = '';
    if(!cat) { div.classList.add('hidden'); return; }
    div.classList.remove('hidden');
    const opts = {'p':['Tipo A','Tipo B'],'f':['Federal A','Federal B','Federal C']};
    opts[cat].forEach(o => { const el=document.createElement('option'); el.text=o; sel.add(el); });
}

// --- KM FORMAT (000+000) ---
document.getElementById('km').addEventListener('input', function (e) {
    let v = e.target.value.replace(/\D/g, '');
    if (v.length > 3) v = v.slice(0, 3) + "+" + v.slice(3, 6);
    e.target.value = v;
});

// --- GPS Y MAPA ---
const map = L.map('map').setView([23.6, -102.5], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let marker;

async function updateLocation(lat, lng) {
    if (marker) marker.setLatLng([lat, lng]); else marker = L.marker([lat, lng]).addTo(map);
    document.getElementById('lat').value = lat.toFixed(6);
    document.getElementById('lng').value = lng.toFixed(6);
    try {
        const resp = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
        const data = await resp.json();
        document.getElementById('estado').value = data.address.state || "";
        document.getElementById('municipio').value = data.address.city || data.address.town || "";
    } catch(e){}
}
map.on('click', e => updateLocation(e.latlng.lat, e.latlng.lng));

function getGPS() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(p => {
            updateLocation(p.coords.latitude, p.coords.longitude);
            map.setView([p.coords.latitude, p.coords.longitude], 15);
        });
    }
}

// --- PDF PROCESSING ---
async function procesarPDF(){
    // Guardar datos del oficial en localstorage
    localStorage.setItem('oficial_grado', document.getElementById('grado').value);
    localStorage.setItem('oficial_nombre', document.getElementById('nombre_gn').value);

    try {
        const { PDFDocument } = PDFLib;
        const fileInput = document.getElementById("archivoPdf");
        if(!fileInput.files.length) return alert("Carga la plantilla PDF.");

        const pdfBytes = await fileInput.files[0].arrayBuffer();
        const pdfDoc = await PDFDocument.load(pdfBytes);
        const form = pdfDoc.getForm();

        const setField = (n, v) => { try { form.getTextField(n).setText(v || ""); } catch(e){} };
    

        const fecha = document.getElementById("fecha").value;
       const dataMap = {
        
    // Hoja 1
    'DICTAMEN TÉCNICO DE HECHO DE TRANSITO No.': document.getElementById('dictamen_no').value,
    'COORDINACIÓN': document.getElementById('coordinacion').value,
    'ESTACION': document.getElementById('estacion').value,
    'IPH': document.getElementById('folio_iph').value,
    'CARRETERA (NUM. Y NOMBRE)': document.getElementById('carretera').value,
    'TRAMO Y RUTA': document.getElementById('tramo').value,
    'KILÓMETRO': document.getElementById('km').value,

    // Hoja 2: Daños Materiales
    'VEH.': document.getElementById('danos_v').value,
    'CAMINO': document.getElementById('danos_c').value,
    'CARGA O SUSTANCIA': document.getElementById('danos_carga_val').value,

    // Hoja 2: Firmas y Ley
    'GRADO': document.getElementById('grado').value,
    'NOMBRE': document.getElementById('nombre_gn').value,
    'EXPEDIENTE': document.getElementById('expediente_gn').value,
    'articulo 30, fracción': document.getElementById('art_fraccion').value,
    'apartado': document.getElementById('art_apartado').value,

    // Georreferenciación
    'GEORREFERENCIACIÓN LATITUD:': document.getElementById('lat').value,
    'LONGITUD:': document.getElementById('lng').value
            };

            // Lógica de fecha con nombres exactos del PDF
            if(fecha){
                const p = fecha.split("-");
                dataMap['AÑO'] = p[0]; 
                dataMap['MES'] = p[1]; 
                dataMap['DIA'] = p[2];
                const dias = ["DOMINGO","LUNES","MARTES","MIÉRCOLES","JUEVES","VIERNES","SÁBADO"];
                dataMap['DIA DE LA SEMANA'] = dias[new Date(p[0], p[1]-1, p[2]).getDay()];
            }

        Object.keys(dataMap).forEach(k => setField(k, dataMap[k]));

        const finalBytes = await pdfDoc.save();
        const blob = new Blob([finalBytes], {type:"application/pdf"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `DICTAMEN_${document.getElementById('dictamen_no').value}.pdf`;
        link.click();
    } catch(err) { alert("Error al generar PDF."); }
}

async function guardarReporte(){

const { data, error } = await supabaseClient
.from("reportes_accidentes")
.insert([{

instancia: document.getElementById("supervisa_select").value,
dictamen_no: document.getElementById("dictamen_no").value,

fecha: document.getElementById("fecha").value,
hora: document.getElementById("hora").value,

carretera: document.getElementById("carretera").value,
tramo: document.getElementById("tramo").value,
ruta: document.getElementById("ruta").value,
kilometro: document.getElementById("km").value,

tipo_hecho: document.getElementById("tipohecho").value,

heridos: parseInt(document.getElementById("num_heridos").value) || 0,
fallecidos: parseInt(document.getElementById("fallecidos").value) || 0,
num_vehiculos: parseInt(document.getElementById("num_veh").value) || 0,
total_participantes: parseInt(document.getElementById("total_participantes").value) || 0,

causa: document.getElementById("causa_select").value,
circunstancia: document.getElementById("circ_select").value,

latitud: parseFloat(document.getElementById("lat").value) || null,
lng: parseFloat(document.getElementById("lng").value) || null,

estado: document.getElementById("estado").value,
municipio: document.getElementById("municipio").value

}]);

if(error){
console.log("ERROR SUPABASE:", error);
alert("Error guardando: " + error.message);
}else{
console.log("Reporte guardado correctamente");
}

}

function setNow() {
    const d = new Date();
    document.getElementById('fecha').value = d.toISOString().split('T')[0];
    document.getElementById('hora').value = d.toTimeString().split(' ')[0].substring(0,5);
